version: '3.8'

services:
  postgres-db:
    image: postgres:15 # Podes usar 'latest', mas é boa prática fixar a versão
    container_name: bd_postgres
    restart: always
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: password
      POSTGRES_DB: nutri_agent
    ports:
      - "5432:5432"
    volumes:
      - dados_postgres:/var/lib/postgresql/data

volumes:
  dados_postgres: